<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <!-- Linking the external CSS file -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <main>
3        <header>
            <h1>Save Our Wildlife</h1>
        </header>

        <div class="video-wrapper" id="video-wrapper">
            <video id="wildlife-video" controls aria-label="Promotional wildlife conservation video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <p class="description">
            Join us in our mission to protect endangered species and their fragile habitats around the globe. 
            Together, we can ensure a thriving planet for generations to come.
        </p>

        <button id="toggle-btn" aria-controls="wildlife-video">Play Video</button>
    </main>

    <!-- Linking the external JS file -->
    <script src="script.js"></script>
</body>
</html>
